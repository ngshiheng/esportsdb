name: Scrape (fast)

on:
    schedule:
        - cron: "0 */2 * * *" # Every 2 hours
    workflow_dispatch:

env:
    DB_PATH: data/esports.db
    ARTIFACT_NAME: esports-db

concurrency:
    group: esports-db-artifact
    cancel-in-progress: false

jobs:
    scrape:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v7

            - name: Set up uv
              uses: astral-sh/setup-uv@v8.1.0
              with:
                  cache-dependency-glob: scrape.py

            - name: Get latest artifact run id
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  # Resolve the run that produced the most recent DB artifact so
                  # the DB accumulates across runs rather than starting fresh each time.
                  run_id=$(gh api \
                    "repos/${{ github.repository }}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=1" \
                    --jq '.artifacts[0].workflow_run.id // empty')
                  if [[ -n "$run_id" ]]; then
                    echo "artifact_run_id=$run_id" >> "$GITHUB_ENV"
                  fi

            - name: Download DB artifact
              if: ${{ env.artifact_run_id != '' }}
              uses: actions/download-artifact@v8
              with:
                  name: ${{ env.ARTIFACT_NAME }}
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              # No continue-on-error: the fast job MUST start from a pre-populated DB.
              # matches has FK dependencies on leagues, series, tournaments, videogames —
              # all populated by scrape-slow. Without the artifact those tables are empty
              # and every upsert will raise a FOREIGN KEY constraint error.

            - name: Validate parent tables are populated
              run: |
                  set -euo pipefail
                  for table in videogames leagues series tournaments; do
                    COUNT=$(sqlite3 "$DB_PATH" "SELECT COUNT(*) FROM $table;")
                    echo "$table row count: $COUNT"
                    if [ "$COUNT" -lt 1 ]; then
                      echo "ERROR: $table is empty. Run scrape-slow first to populate parent tables."
                      exit 1
                    fi
                  done

            - name: Run scrape-fast
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: make scrape-fast

            # Matches table must be non-empty — a fully empty DB indicates
            # the scraper failed silently or the DB was not downloaded correctly.
            - name: Validate DB
              run: |
                  set -euo pipefail
                  if [ ! -f "$DB_PATH" ]; then
                    echo "ERROR: $DB_PATH does not exist. Aborting upload."
                    exit 1
                  fi

                  COUNT=$(sqlite3 "$DB_PATH" "SELECT COUNT(*) FROM matches;")
                  echo "matches row count: $COUNT"
                  if [ "$COUNT" -lt 1 ]; then
                    echo "ERROR: matches table is empty. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ env.ARTIFACT_NAME }}
                  path: ${{ env.DB_PATH }}
                  if-no-files-found: error
                  retention-days: 1
