name: Scrape (fast)

on:
    schedule:
        - cron: "0 */2 * * *" # Every 2 hours
    workflow_dispatch:

env:
    DB_PATH: data/esports.db
    ARTIFACT_NAME: esports-db

concurrency:
    group: esports-db-artifact
    cancel-in-progress: false

jobs:
    scrape:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v7

            - name: Set up uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                  cache-dependency-glob: scrape.py

            - name: Get latest artifact run id
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  # Resolve the run that produced the most recent DB artifact so
                  # the DB accumulates across runs rather than starting fresh each time.
                  run_id=$(gh api \
                    "repos/${{ github.repository }}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=1" \
                    --jq '.artifacts[0].workflow_run.id // empty')
                  if [[ -n "$run_id" ]]; then
                    echo "artifact_run_id=$run_id" >> "$GITHUB_ENV"
                  fi

            - name: Download DB artifact
              if: ${{ env.artifact_run_id != '' }}
              uses: actions/download-artifact@v8
              with:
                  name: ${{ env.ARTIFACT_NAME }}
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              # No continue-on-error: the fast job MUST start from a pre-populated DB.
              # matches has FK dependencies on leagues, series, tournaments, videogames —
              # all populated by scrape-slow. Without the artifact those tables are empty
              # and every upsert will raise a FOREIGN KEY constraint error.

            - name: Validate parent tables are populated
              run: |
                  set -euo pipefail
                  for table in videogames leagues series tournaments; do
                    COUNT=$(sqlite3 "$DB_PATH" "SELECT COUNT(*) FROM $table;")
                    echo "$table row count: $COUNT"
                    if [ "$COUNT" -lt 1 ]; then
                      echo "ERROR: $table is empty. Run scrape-slow first to populate parent tables."
                      exit 1
                    fi
                  done

            - name: Run scrape-fast
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: make scrape-fast

            # Matches table must be non-empty — a fully empty DB indicates
            # the scraper failed silently or the DB was not downloaded correctly.
            - name: Validate DB
              run: |
                  set -euo pipefail
                  if [ ! -f "$DB_PATH" ]; then
                    echo "ERROR: $DB_PATH does not exist. Aborting upload."
                    exit 1
                  fi

                  COUNT=$(sqlite3 "$DB_PATH" "SELECT COUNT(*) FROM matches;")
                  echo "matches row count: $COUNT"
                  if [ "$COUNT" -lt 1 ]; then
                    echo "ERROR: matches table is empty. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ env.ARTIFACT_NAME }}
                  path: ${{ env.DB_PATH }}
                  if-no-files-found: error
                  retention-days: 1

    deploy:
        needs: scrape
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        env:
            RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
            RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
            RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
            RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
            RAILWAY_API_URL: https://backboard.railway.app/graphql/v2
        steps:
            - name: Check out this repo
              uses: actions/checkout@v7

            - name: Get Latest Deployment ID
              id: get-deployment
              run: |
                  set -euo pipefail
                  for secret_name in RAILWAY_TOKEN RAILWAY_PROJECT_ID RAILWAY_ENVIRONMENT_ID RAILWAY_SERVICE_ID; do
                    if [[ -z "${!secret_name}" ]]; then
                      echo "ERROR: $secret_name is empty."
                      exit 1
                    fi
                  done

                  echo "Fetching latest deployment ID..."
                  RESPONSE=$(curl --fail-with-body -sS --retry 5 --retry-all-errors --retry-delay 2 -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer $RAILWAY_TOKEN" \
                    -H "User-Agent: GitHub-Actions" \
                    --url "$RAILWAY_API_URL" \
                    -d '{
                      "query": "query deployments { deployments(last: 1, input: { projectId: \"'"$RAILWAY_PROJECT_ID"'\", environmentId: \"'"$RAILWAY_ENVIRONMENT_ID"'\", serviceId: \"'"$RAILWAY_SERVICE_ID"'\", status: { in: [SUCCESS, SLEEPING] } }) { edges { node { id status } } } }",
                      "operationName": "deployments"
                    }')

                  echo "API Response:"
                  echo "$RESPONSE"

                  if echo "$RESPONSE" | jq -e '.errors'; then
                    echo "Error in API response"
                    exit 1
                  fi

                  DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.id // empty')
                  if [[ -z "$DEPLOYMENT_ID" ]]; then
                    echo "ERROR: No active deployment found. Check Railway IDs or create a successful deployment first."
                    exit 1
                  fi
                  echo "Found deployment ID: $DEPLOYMENT_ID"
                  echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

            - name: Trigger redeployment
              run: |
                  set -euo pipefail
                  echo "Triggering redeployment for ID: ${{ steps.get-deployment.outputs.deployment_id }}"
                  RESPONSE=$(curl --fail-with-body -sS --retry 5 --retry-all-errors --retry-delay 2 -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer $RAILWAY_TOKEN" \
                    -H "User-Agent: GitHub-Actions" \
                    --url "$RAILWAY_API_URL" \
                    -d "{
                      \"query\": \"mutation { deploymentRedeploy(id: \\\"${{ steps.get-deployment.outputs.deployment_id }}\\\", usePreviousImageTag: true) { id status } }\"
                    }")

                  echo "API Response:"
                  echo "$RESPONSE"

                  if echo "$RESPONSE" | jq -e '.errors'; then
                    echo "Error in API response"
                    exit 1
                  fi

                  NEW_DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.deploymentRedeploy.id // empty')
                  if [[ -z "$NEW_DEPLOYMENT_ID" ]]; then
                    echo "ERROR: Railway redeploy did not return a deployment id."
                    exit 1
                  fi
                  echo "Redeploy accepted: $NEW_DEPLOYMENT_ID"
