name: Scrape (static tables)

on:
    schedule:
        - cron: "0 0 * * 0" # Weekly on Sunday at 00:00 UTC
    workflow_dispatch:

# Same group as the other scrape jobs — serialises all DB artifact access.
concurrency:
    group: esportsdb-artifact
    cancel-in-progress: false

jobs:
    scrape:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: astral-sh/setup-uv@v5

            - name: Get latest artifact run id
              run: |
                  ARTIFACT_RUN_ID=$(curl -s \
                    -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
                    "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=esportsdb&per_page=1" \
                    | jq '.artifacts[0].workflow_run.id')
                  echo "artifact_run_id=$ARTIFACT_RUN_ID" >> $GITHUB_ENV

            - name: Download previous DB artifact
              uses: actions/download-artifact@v4
              with:
                  name: esportsdb
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ secrets.GH_PAT }}
              # First-ever run has no artifact — let the scraper bootstrap a fresh DB.
              continue-on-error: true

            - name: Scrape static tables
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run main.py \
                    --db data/esports.db \
                    --resources videogames,leagues

            - name: Validate DB
              run: |
                  COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM leagues;")
                  echo "leagues row count: $COUNT"
                  if [ "$COUNT" -lt 100 ]; then
                    echo "ERROR: leagues count $COUNT is below threshold. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v4
              with:
                  name: esportsdb
                  path: data/esports.db
                  if-no-files-found: error
                  retention-days: 90
