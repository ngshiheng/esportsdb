name: Test

on:
    push:
        branches: ["**"]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@v8.1.0
              with:
                  uv-version: "0.10.7"

            - name: Run tests
              run: make test
