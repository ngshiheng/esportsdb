name: Test

on:
    push:
        branches: ["**"]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.2.0
              with:
                  cache-dependency-glob: scrape.py

            - name: Run tests
              run: make test
