name: Scrape (daily)

on:
    schedule:
        - cron: "0 2 * * *" # Daily at 02:00 UTC
    workflow_dispatch:

concurrency:
    group: esports-db-artifact
    cancel-in-progress: false

jobs:
    scrape:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@v8.1.0
              with:
                  cache-dependency-glob: scrape.py

            - name: Get latest artifact run id
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  # Resolve the run that produced the most recent esports-db artifact so
                  # the DB accumulates across runs rather than starting fresh each time.
                  run_id=$(gh api \
                    "repos/${{ github.repository }}/actions/artifacts?name=esports-db&per_page=1" \
                    --jq '.artifacts[0].workflow_run.id // empty')
                  if [[ -n "$run_id" ]]; then
                    echo "artifact_run_id=$run_id" >> "$GITHUB_ENV"
                  fi

            - name: Download previous DB artifact
              uses: actions/download-artifact@v8
              with:
                  name: esports-db
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              # First-ever run has no artifact — let the scraper bootstrap a fresh DB.
              continue-on-error: true

            - name: Scrape daily resources
              id: scrape
              continue-on-error: true
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run scrape.py \
                    --db data/esports.db \
                    --resource videogames \
                    --resource leagues \
                    --resource series \
                    --resource tournaments \
                    --resource teams \
                    --resource players

            # Gate: prevent an empty/corrupt DB from overwriting a good artifact.
            # Runs even when scrape was rate-limited so partial progress is preserved.
            - name: Validate DB
              if: always()
              run: |
                  COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM players;")
                  echo "players row count: $COUNT"
                  if [ "$COUNT" -lt 100 ]; then
                    echo "ERROR: players count $COUNT is below threshold. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: esports-db
                  path: data/esports.db
                  if-no-files-found: error
                  retention-days: 90

            - name: Install datasette
              run: pipx install datasette

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ngshiheng
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Docker image
              run: make docker-build

            - name: Push Docker image
              run: make docker-push

    deploy:
        needs: scrape
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Check out this repo
              uses: actions/checkout@v6

            - name: Get Latest Deployment ID
              id: get-deployment
              run: |
                  echo "Fetching latest deployment ID..."
                  RESPONSE=$(curl --fail-with-body -s -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
                    -H "User-Agent: GitHub-Actions" \
                    --url https://backboard.railway.app/graphql/v2 \
                    -d '{
                      "query": "query deployments { deployments(last: 1, input: { projectId: \"${{ secrets.RAILWAY_PROJECT_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\", status: { in: [SUCCESS, SLEEPING] } }) { edges { node { id status } } } }",
                      "operationName": "deployments"
                    }')

                  echo "API Response:"
                  echo "$RESPONSE"

                  if echo "$RESPONSE" | jq -e '.errors'; then
                    echo "Error in API response"
                    exit 1
                  fi

                  DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.id')
                  echo "Found deployment ID: $DEPLOYMENT_ID"
                  echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

            - name: Trigger redeployment
              run: |
                  echo "Triggering redeployment for ID: ${{ steps.get-deployment.outputs.deployment_id }}"
                  RESPONSE=$(curl --fail-with-body -s -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
                    -H "User-Agent: GitHub-Actions" \
                    --url https://backboard.railway.app/graphql/v2 \
                    -d "{
                      \"query\": \"mutation { deploymentRedeploy(id: \\\"${{ steps.get-deployment.outputs.deployment_id }}\\\", usePreviousImageTag: true) { id status } }\"
                    }")

                  echo "API Response:"
                  echo "$RESPONSE"

                  if echo "$RESPONSE" | jq -e '.errors'; then
                    echo "Error in API response"
                    exit 1
                  fi
