name: Scrape (historical backfill — manual only)

# Triggered manually ONLY. Never scheduled — this run takes ~2.5 hours.
on:
    workflow_dispatch:

# Holds the shared DB artifact lock for the full duration.
concurrency:
    group: esportsdb-artifact
    cancel-in-progress: false

jobs:
    backfill:
        runs-on: ubuntu-latest
        # Full matches sweep: ~2534 pages × 3s delay ≈ 2.5h; add headroom.
        timeout-minutes: 360
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v4

            - uses: astral-sh/setup-uv@v5

            - name: Get latest artifact run id
              run: |
                  ARTIFACT_RUN_ID=$(curl -s \
                    -H "Authorization: Bearer ${{ github.token }}" \
                    "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=esportsdb&per_page=1" \
                    | jq '.artifacts[0].workflow_run.id // empty')
                  echo "artifact_run_id=$ARTIFACT_RUN_ID" >> $GITHUB_ENV

            - name: Download previous DB artifact
              uses: actions/download-artifact@v4
              with:
                  name: esportsdb
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              continue-on-error: true

            - name: Backfill all historical matches
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run main.py \
                    --db data/esports.db \
                    --resources matches \
                    --page-delay 3

            - name: Validate DB
              run: |
                  COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM matches;")
                  echo "matches row count: $COUNT"
                  if [ "$COUNT" -lt 1000 ]; then
                    echo "ERROR: matches count $COUNT is below threshold. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v4
              with:
                  name: esportsdb
                  path: data/esports.db
                  if-no-files-found: error
                  retention-days: 90
