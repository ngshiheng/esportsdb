name: Scrape (upcoming)

on:
    schedule:
        - cron: "0 */2 * * *" # Every 2 hours
    workflow_dispatch:

concurrency:
    group: esports-db-artifact
    cancel-in-progress: false

jobs:
    scrape:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@v8.1.0
              with:
                  cache-dependency-glob: scrape.py

            - name: Get latest artifact run id
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  # Resolve the run that produced the most recent esports-db artifact so
                  # the DB accumulates across runs rather than starting fresh each time.
                  run_id=$(gh api \
                    "repos/${{ github.repository }}/actions/artifacts?name=esports-db&per_page=1" \
                    --jq '.artifacts[0].workflow_run.id // empty')
                  if [[ -n "$run_id" ]]; then
                    echo "artifact_run_id=$run_id" >> "$GITHUB_ENV"
                  fi

            - name: Download previous DB artifact
              uses: actions/download-artifact@v8
              with:
                  name: esports-db
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              # No continue-on-error: the fast job MUST start from a pre-populated DB.
              # matches has FK dependencies on leagues, series, tournaments, videogames —
              # all populated by scrape-slow. Without the artifact those tables are empty
              # and every upsert will raise a FOREIGN KEY constraint error.

            - name: Validate parent tables are populated
              run: |
                  for table in videogames leagues series tournaments; do
                    COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM $table;")
                    echo "$table row count: $COUNT"
                    if [ "$COUNT" -lt 1 ]; then
                      echo "ERROR: $table is empty. Run scrape-slow first to populate parent tables."
                      exit 1
                    fi
                  done

            - name: Scrape upcoming & live data
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run scrape.py \
                    --db data/esports.db \
                    --resource series_upcoming \
                    --resource series_running \
                    --resource tournaments_upcoming \
                    --resource tournaments_running \
                    --resource matches_upcoming \
                    --resource matches_running

            - name: Scrape recent past matches
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run scrape.py \
                    --db data/esports.db \
                    --resource matches \
                    --since 48h

            # Matches table must be non-empty — a fully empty DB indicates
            # the scraper failed silently or the DB was not downloaded correctly.
            - name: Validate DB
              run: |
                  COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM matches;")
                  echo "matches row count: $COUNT"
                  if [ "$COUNT" -lt 1 ]; then
                    echo "ERROR: matches table is empty. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v7
              with:
                  name: esports-db
                  path: data/esports.db
                  if-no-files-found: error
                  retention-days: 90
