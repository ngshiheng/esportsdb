name: Scrape (historical backfill)

# Triggered manually ONLY. Never scheduled — this run takes ~2.5 hours.
on:
    workflow_dispatch:

concurrency:
    group: esports-db-artifact
    cancel-in-progress: false

jobs:
    backfill:
        runs-on: ubuntu-latest
        # Full matches sweep: ~2534 pages × 3s delay ≈ 2.5h; add headroom.
        timeout-minutes: 360
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@v6
              with:
                  cache-dependency-glob: scrape.py

            - name: Get latest artifact run id
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  run_id=$(gh api \
                    "repos/${{ github.repository }}/actions/artifacts?name=esports-db&per_page=1" \
                    --jq '.artifacts[0].workflow_run.id // empty')
                  if [[ -n "$run_id" ]]; then
                    echo "artifact_run_id=$run_id" >> "$GITHUB_ENV"
                  fi

            - name: Download previous DB artifact
              uses: actions/download-artifact@v8
              with:
                  name: esports-db
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              continue-on-error: true

            - name: Backfill all historical matches
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run scrape.py \
                    --db data/esports.db \
                    --resource matches \
                    --page-delay 3

            - name: Validate DB
              run: |
                  COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM matches;")
                  echo "matches row count: $COUNT"
                  if [ "$COUNT" -lt 1000 ]; then
                    echo "ERROR: matches count $COUNT is below threshold. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v7
              with:
                  name: esports-db
                  path: data/esports.db
                  if-no-files-found: error
                  retention-days: 90
