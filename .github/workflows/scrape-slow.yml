name: Scrape (daily tables)

on:
    schedule:
        - cron: "0 2 * * *" # Daily at 02:00 UTC
    push:
        branches: [main]
        paths:
            - "**.py"
            - ".github/workflows/**"
            - Makefile
            - data/metadata.json
    workflow_dispatch:

# Only one run may hold the shared DB artifact at a time.
concurrency:
    group: esportsdb-artifact
    cancel-in-progress: false

jobs:
    scrape:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read

        steps:
            - uses: actions/checkout@v4

            - uses: astral-sh/setup-uv@v5

            # Fetch the artifact from the most recent successful run so the DB
            # accumulates data across runs instead of starting from scratch each time.
            - name: Get latest artifact run id
              run: |
                  ARTIFACT_RUN_ID=$(curl -s \
                    -H "Authorization: Bearer ${{ github.token }}" \
                    "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=esportsdb&per_page=1" \
                    | jq '.artifacts[0].workflow_run.id // empty')
                  echo "artifact_run_id=$ARTIFACT_RUN_ID" >> $GITHUB_ENV

            - name: Download previous DB artifact
              uses: actions/download-artifact@v4
              with:
                  name: esportsdb
                  path: ./data/
                  run-id: ${{ env.artifact_run_id }}
                  github-token: ${{ github.token }}
              # First-ever run has no artifact — let the scraper bootstrap a fresh DB.
              continue-on-error: true

            - name: Scrape daily resources
              env:
                  PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
              run: |
                  uv run main.py \
                    --db data/esports.db \
                    --resources videogames,leagues,series,tournaments,teams,players

            # Gate: prevent an empty/corrupt DB from overwriting a good artifact.
            - name: Validate DB
              run: |
                  COUNT=$(sqlite3 data/esports.db "SELECT COUNT(*) FROM players;")
                  echo "players row count: $COUNT"
                  if [ "$COUNT" -lt 100 ]; then
                    echo "ERROR: players count $COUNT is below threshold. Aborting upload."
                    exit 1
                  fi

            - name: Upload updated DB artifact
              uses: actions/upload-artifact@v4
              with:
                  name: esportsdb
                  path: data/esports.db
                  if-no-files-found: error
                  retention-days: 90
